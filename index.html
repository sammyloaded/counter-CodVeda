<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Counter | Task 3</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="counter-card">
      <h1>Counter</h1>
      <div id="display" class="count-display">0</div>

      <div class="button-group">
        <button id="decrement" class="btn secondary">-</button>
        <button id="reset" class="btn outline">Reset</button>
        <button id="increment" class="btn primary">+</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
